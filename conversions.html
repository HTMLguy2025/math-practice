<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="newicon.png" type="image/x-icon">
    <script src="version.js"></script>
    <title>Math Practice</title>
    <style>
        body { padding: 16px; }

        .prev-area {
            min-height: 2rem;
            font-size: 1.1rem;
            color: rgba(190, 205, 218, 0.35);
            margin-top: 0.5rem;
            opacity: 0;
            animation: prevFadeIn 0.4s ease forwards;
        }
        .prev-area.correct-result { color: rgba(100, 190, 100, 0.65); }
        .prev-area.wrong-result   { color: rgba(210, 80, 80, 0.65); }
        @keyframes prevFadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Question display */

        .question-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 2.5rem 0 2rem;
            gap: 0.5rem;
        }

        .question-sub {
            font-size: 0.9rem;
            color: rgba(190, 205, 218, 0.4);
        }

        .question-display {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            font-size: 2rem;
            color: rgba(220, 230, 245, 0.92);
            flex-wrap: wrap;
        }

        /* Fraction rendering */

        .frac {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            line-height: 1;
            gap: 0;
        }
        .frac-num, .frac-den { font-size: 1.5rem; padding: 0 3px; }
        .frac-bar { width: 100%; height: 2px; background: rgba(220,230,245,0.7); min-width: 1.2em; }

        /* Answer input */

        .answer-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .answer-hint {
            font-size: 0.85rem;
            color: rgba(190, 205, 218, 0.4);
        }

        .answer-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        #answerInput {
            font-family: 'Roboto Mono', monospace;
            font-size: 1.6rem;
            background: rgba(35, 50, 85, 0.8);
            color: rgba(227, 234, 245, 0.95);
            border: 2px solid rgba(190, 205, 218, 0.2);
            padding: 10px 16px;
            width: 160px;
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
            caret-color: rgba(190, 205, 218, 0.8);
        }

        #answerInput:focus {
            border-color: rgba(90, 130, 200, 0.6);
        }

        #answerInput.flash-correct {
            border-color: rgba(79, 160, 63, 0.9);
            background: rgba(50, 100, 50, 0.4);
            transition: none;
        }

        #answerInput.flash-wrong {
            border-color: rgba(200, 60, 60, 0.9);
            background: rgba(100, 40, 40, 0.4);
            transition: none;
        }

        .check-btn {
            font-family: 'Roboto Mono', monospace;
            font-size: 1rem;
            padding: 10px 20px;
            background: rgb(35, 50, 85);
            color: rgba(227, 234, 245, 0.9);
            border: none;
            cursor: pointer;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            transition: background-color 0.15s;
        }
        .check-btn:hover { background: rgb(52, 75, 120); }
        .check-btn:active { background: rgb(20, 32, 60); box-shadow: none; }

        /* Numpad */

        .numpad {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            max-width: 260px;
        }

        .np-btn {
            font-family: 'Roboto Mono', monospace;
            font-size: 1.1rem;
            padding: 12px 0;
            background: rgb(35, 50, 85);
            color: rgba(227, 234, 245, 0.9);
            border: none;
            cursor: pointer;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.4);
            transition: background-color 0.15s;
            text-align: center;
        }
        .np-btn:hover  { background: rgb(52, 75, 120); }
        .np-btn:active { background: rgb(20, 32, 60); box-shadow: none; }
        .np-btn.wide   { grid-column: span 2; }

        @media (max-width: 480px) {
            .frac-num, .frac-den { font-size: 1.2rem; }
            .question-display { font-size: 1.6rem; }
        }
    </style>
</head>
<body class="darkTheme">
<div style="z-index:1;">
    <div class="header">
        <div>
            <span class="title1">Math Practice</span>
            <div id="modeIndicator" class="modeIndicator"></div>
        </div>
        <div class="scoreDisplay">
            <div>
                <span class="questionsCorrect" id="questionscorrect">0</span>
                <span class="questionsCorrect">/</span>
                <span class="questionsCorrect" id="questionsAnswered">0</span>
                <span class="questionsCorrect"> correct</span>
            </div>
        </div>
    </div>

    <div id="prevArea" class="prev-area"></div>

    <div class="question-area">
        <div id="questionSub" class="question-sub"></div>
        <div id="questionDisplay" class="question-display"></div>
    </div>

    <div class="answer-area">
        <div id="answerHint" class="answer-hint"></div>
        <div class="answer-row">
            <input type="text" id="answerInput" autocomplete="off" autocorrect="off"
                   spellcheck="false" placeholder="?" />
            <button class="check-btn" id="checkBtn">Check</button>
        </div>
        <div class="numpad" id="numpad"></div>
    </div>

    <br><br>
    <div class="modeButtonRow">
        <button id="finishButton" class="finishButton">Finish</button>
    </div>

    <div class="textOnTheRight"></div>
</div>

<script>
    // --- URL params ---
    const params        = new URLSearchParams(window.location.search);
    const exerciseParam = params.get('exercise') || 'frac-to-decimal';
    const exerciseList  = exerciseParam.split(',');
    // --- Score ---
    let questionsCorrect  = 0;
    let questionsAnswered = 0;

    // --- Helpers ---
    function gcd(a, b) { return b === 0 ? Math.abs(a) : gcd(b, a % b); }
    function reduce(n, d) { const g = gcd(Math.abs(n), Math.abs(d)); return { n: n/g, d: d/g }; }
    function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function randFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function fracHTML(n, d) {
        return `<div class="frac"><span class="frac-num">${n}</span><div class="frac-bar"></div><span class="frac-den">${d}</span></div>`;
    }

    // Denominators whose decimals terminate and are "nice"
    const NICE_DENOMS = [2, 4, 5, 8, 10, 20, 25, 100];

    // --- Exercise definitions ---
    const EXERCISES = {

        'frac-to-decimal': {
            label: 'Fraction → Decimal',
            sub: 'Convert to a decimal.',
            hint: 'e.g. 3/4 → 0.75',
            answerType: 'decimal',
            generate() {
                const d = randFrom(NICE_DENOMS);
                const n = randInt(1, d - 1);
                const r = reduce(n, d);
                const decimal = r.n / r.d;
                return {
                    display: fracHTML(r.n, r.d),
                    answer: String(decimal),
                    summary: `${r.n}/${r.d} = ${decimal}`
                };
            }
        },

        'decimal-to-frac': {
            label: 'Decimal → Fraction',
            sub: 'Convert to a simplified fraction.',
            hint: 'e.g. 0.75 → 3/4',
            answerType: 'fraction',
            generate() {
                const d = randFrom(NICE_DENOMS);
                const n = randInt(1, d - 1);
                const r = reduce(n, d);
                const decimal = r.n / r.d;
                return {
                    display: `<span>${decimal}</span>`,
                    answerN: r.n, answerD: r.d,
                    summary: `${decimal} = ${r.n}/${r.d}`
                };
            }
        },

        'frac-to-percent': {
            label: 'Fraction → Percent',
            sub: 'Convert to a percentage.',
            hint: 'e.g. 3/4 → 75',
            answerType: 'percent',
            generate() {
                const d = randFrom([2, 4, 5, 10, 20, 25, 50, 100]);
                const n = randInt(1, d - 1);
                const r = reduce(n, d);
                const pct = Math.round((r.n / r.d) * 100);
                return {
                    display: fracHTML(r.n, r.d),
                    answer: String(pct),
                    summary: `${r.n}/${r.d} = ${pct}%`
                };
            }
        },

        'percent-to-frac': {
            label: 'Percent → Fraction',
            sub: 'Convert to a simplified fraction.',
            hint: 'e.g. 75% → 3/4',
            answerType: 'fraction',
            generate() {
                const d = randFrom([2, 4, 5, 10, 20, 25, 50, 100]);
                const n = randInt(1, d - 1);
                const r = reduce(n, d);
                const pct = Math.round((r.n / r.d) * 100);
                return {
                    display: `<span>${pct}%</span>`,
                    answerN: r.n, answerD: r.d,
                    summary: `${pct}% = ${r.n}/${r.d}`
                };
            }
        },

        'decimal-to-percent': {
            label: 'Decimal → Percent',
            sub: 'Convert to a percentage.',
            hint: 'e.g. 0.6 → 60',
            answerType: 'percent',
            generate() {
                const d = randFrom([2, 4, 5, 10, 20, 25, 50, 100]);
                const n = randInt(1, d - 1);
                const r = reduce(n, d);
                const decimal = r.n / r.d;
                const pct = Math.round(decimal * 100);
                return {
                    display: `<span>${decimal}</span>`,
                    answer: String(pct),
                    summary: `${decimal} = ${pct}%`
                };
            }
        },

        'percent-to-decimal': {
            label: 'Percent → Decimal',
            sub: 'Convert to a decimal.',
            hint: 'e.g. 75% → 0.75',
            answerType: 'decimal',
            generate() {
                const d = randFrom([2, 4, 5, 10, 20, 25, 50, 100]);
                const n = randInt(1, d - 1);
                const r = reduce(n, d);
                const decimal = r.n / r.d;
                const pct = Math.round(decimal * 100);
                return {
                    display: `<span>${pct}%</span>`,
                    answer: String(decimal),
                    summary: `${pct}% = ${decimal}`
                };
            }
        }
    };

    // --- State ---
    let currentQ = null;
    let locked   = false;

    // --- Answer checking ---
    function parseUserAnswer(raw, answerType) {
        const s = raw.trim().replace(/%$/, '');  // strip trailing %
        if (answerType === 'fraction') {
            if (s.includes('/')) {
                const [a, b] = s.split('/').map(x => parseInt(x.trim()));
                if (!isNaN(a) && !isNaN(b) && b !== 0) return { n: a, d: b };
            }
            return null;
        }
        const v = parseFloat(s);
        return isNaN(v) ? null : v;
    }

    function answersMatch(parsed, q) {
        if (currentDef_.answerType === 'fraction') {
            if (!parsed || parsed.d === undefined) return false;
            return parsed.n * q.answerD === q.answerN * parsed.d;
        }
        // decimal or percent: compare as numbers with small tolerance
        if (parsed === null) return false;
        return Math.abs(parsed - parseFloat(q.answer)) < 0.0001;
    }

    // Cached def for the current question (set in loadQuestion)
    let currentDef_ = null;

    // --- Load question ---
    function loadQuestion() {
        locked = false;
        const key = exerciseList[Math.floor(Math.random() * exerciseList.length)];
        currentDef_ = EXERCISES[key] || EXERCISES['frac-to-decimal'];
        currentQ = currentDef_.generate();

        document.getElementById('questionSub').textContent = currentDef_.sub;
        document.getElementById('questionDisplay').innerHTML = currentQ.display;
        document.getElementById('answerHint').textContent = currentDef_.hint;

        const input = document.getElementById('answerInput');
        input.value = '';
        input.className = '';
        input.placeholder = currentDef_.answerType === 'fraction' ? '?/?' : '?';
        input.focus();

        buildNumpad(currentDef_.answerType);
    }

    // --- Numpad ---
    function buildNumpad(answerType) {
        const pad = document.getElementById('numpad');
        pad.innerHTML = '';
        const keys = answerType === 'fraction'
            ? ['7','8','9','⌫','4','5','6','/','1','2','3','-','0','.','','✓']
            : ['7','8','9','⌫','4','5','6','','1','2','3','','0','.','',''    ];

        keys.forEach(k => {
            if (k === '') { pad.appendChild(document.createElement('div')); return; }
            const btn = document.createElement('button');
            btn.className = 'np-btn';
            btn.textContent = k;
            btn.addEventListener('click', () => handleKey(k));
            pad.appendChild(btn);
        });
    }

    function handleKey(k) {
        const input = document.getElementById('answerInput');
        if (k === '⌫') {
            input.value = input.value.slice(0, -1);
        } else if (k === '✓') {
            handleCheck();
        } else {
            input.value += k;
        }
    }

    // --- Check ---
    function handleCheck() {
        if (locked || !currentQ) return;
        const raw = document.getElementById('answerInput').value;
        const parsed = parseUserAnswer(raw, currentDef_.answerType);
        const correct = answersMatch(parsed, currentQ);
        locked = true;
        questionsAnswered++;

        const input = document.getElementById('answerInput');
        const prevArea = document.getElementById('prevArea');

        if (correct) {
            questionsCorrect++;
            input.classList.add('flash-correct');
            prevArea.className = 'prev-area correct-result';
            prevArea.style.animation = 'none';
            prevArea.textContent = '✓  ' + currentQ.summary;
        } else {
            input.classList.add('flash-wrong');
            prevArea.className = 'prev-area wrong-result';
            prevArea.style.animation = 'none';
            prevArea.textContent = '✗  ' + currentQ.summary;
        }

        document.getElementById('questionscorrect').textContent = questionsCorrect;
        document.getElementById('questionsAnswered').textContent = questionsAnswered;

        setTimeout(() => {
            prevArea.style.animation = '';
            input.classList.remove('flash-correct', 'flash-wrong');
            loadQuestion();
        }, 1200);
    }

    // --- Init ---
    document.addEventListener('DOMContentLoaded', () => {
        const label = exerciseList.length > 1
            ? 'Mixed Conversions'
            : (EXERCISES[exerciseList[0]] || EXERCISES['frac-to-decimal']).label;
        document.getElementById('modeIndicator').textContent = label;

        document.getElementById('answerInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') handleCheck();
        });

        document.getElementById('checkBtn').addEventListener('click', handleCheck);
        document.getElementById('finishButton').addEventListener('click', () => { window.location.href = 'index.html'; });

        loadQuestion();
    });
</script>
</body>
</html>
