<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="newicon.png" type="image/x-icon">
    <script src="version.js"></script>
    <title>Math Practice</title>
    <style>
        body {
            padding: 16px;
        }

        /* Previous question */

        .prev-area {
            min-height: 2rem;
            font-size: 1.1rem;
            color: rgba(190, 205, 218, 0.35);
            margin-top: 0.5rem;
        }

        .prev-area.correct-result { color: rgba(100, 190, 100, 0.65); }
        .prev-area.wrong-result   { color: rgba(210, 80,  80,  0.65); }

        /* Fraction display (read-only problem fractions) */

        .frac {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            vertical-align: middle;
            line-height: 1.1;
        }

        .frac-num, .frac-den {
            text-align: center;
            padding: 2px 6px;
        }

        .frac-bar {
            width: 100%;
            border-top: 2px solid rgba(190, 205, 218, 0.7);
        }

        /* Equation row */

        .equation {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 2.5rem;
            flex-wrap: wrap;
            margin: 2rem 0 1.5rem;
        }

        /* Answer fraction input */

        .answer-frac {
            display: inline-flex;
            flex-direction: column;
            align-items: stretch;
            vertical-align: middle;
        }

        .answer-box-wrap {
            background-color: rgb(10, 10, 20);
            padding: 2px;
        }

        .answer-box {
            background-color: rgb(28, 30, 50);
            color: #e0e8ff;
            font-size: 2.5rem;
            min-width: 72px;
            min-height: 1.4em;
            padding: 2px 10px;
            text-align: center;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.15s;
        }

        .answer-box.focused {
            background-color: rgb(38, 42, 72);
        }

        .answer-bar {
            border-top: 2px solid rgba(190, 205, 218, 0.7);
            margin: 3px 0;
        }

        /* Flash states */

        .answer-box.flash-correct {
            background-color: rgb(60, 100, 55) !important;
            transition: none;
        }

        .answer-box.flash-wrong {
            background-color: rgb(120, 40, 40) !important;
            transition: none;
        }

        /* Mixed number answer layout */

        .answer-mixed {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            vertical-align: middle;
        }

        /* Exercise instruction text */

        .exercise-hint {
            font-size: 0.95rem;
            color: rgba(190, 205, 218, 0.45);
            margin-bottom: 0.25rem;
        }

        /* Responsive */

        @media (max-width: 480px) {
            .equation {
                font-size: 1.8rem;
            }

            .answer-box {
                font-size: 1.8rem;
                min-width: 54px;
            }
        }
    </style>
</head>
<body class="darkTheme">

    <div style="z-index: 1;">
        <div class="header">
            <div>
                <span class="title1">Math Practice</span>
                <div id="modeIndicator" class="modeIndicator"></div>
            </div>
            <div class="scoreDisplay">
                <div>
                    <span class="questionsCorrect" id="questionscorrect">0</span>
                    <span class="questionsCorrect">/</span>
                    <span class="questionsCorrect" id="questionsAnswered">0</span>
                    <span class="questionsCorrect"> correct</span>
                </div>
            </div>
        </div>

        <div id="prevArea" class="prev-area"></div>

        <br>

        <div id="hintText" class="exercise-hint"></div>
        <div id="equationArea" class="equation"></div>

        <br>

        <div class="numberbuttons">
            <button class="numButtons" id="btn1">1</button>
            <button class="numButtons" id="btn2">2</button>
            <button class="numButtons" id="btn3">3</button>
            <button class="checkButton" id="checkBtn"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" style="width:1em;height:1em;display:block;"><path d="M 4 13 C 6 15 7 17 9 19 C 11 14 14 9 19 4"/></svg></button>
            <button class="numButtons" id="btn4">4</button>
            <button class="numButtons" id="btn5">5</button>
            <button class="numButtons" id="btn6">6</button>
            <button class="numButtons" id="btn7">7</button>
            <button class="numButtons" id="btn8">8</button>
            <button class="numButtons" id="btn9">9</button>
            <button class="numButtons" id="btnSwitch" title="Toggle negative sign">&plusmn;</button>
            <button class="numButtons" id="btn0">0</button>
            <button class="numButtons" id="btnBack">&#x232B;</button>
        </div>

        <br>
        <button id="deleteButton" class="deleteButton">Delete</button>
        <br><br>

        <div class="modeButtonRow">
            <button id="finishButton" class="finishButton">Finish</button>
        </div>

        <div class="textOnTheRight"></div>
    </div>

    <script>
        // --- URL params ---
        const params        = new URLSearchParams(window.location.search);
        const exerciseParam = params.get('exercise') || 'add-like';
        const exerciseList  = exerciseParam.split(',');
        const exercise      = exerciseParam; // used for score key

        // --- Score ---
        let questionsCorrect = 0;
        let questionsAnswered = 0;

        // --- Helpers ---
        function gcd(a, b) { return b === 0 ? Math.abs(a) : gcd(b, a % b); }
        function lcm(a, b) { return (a * b) / gcd(a, b); }

        function reduce(n, d) {
            const g = gcd(Math.abs(n), Math.abs(d));
            return { n: n / g, d: d / g };
        }

        function isReduced(n, d) { return gcd(Math.abs(n), Math.abs(d)) === 1; }

        // Cross-multiply equality: n1/d1 == n2/d2
        function fracEqual(n1, d1, n2, d2) { return n1 * d2 === n2 * d1; }

        function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
        function randFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

        // --- Particles ---
        const particleColors = ['#4fc3f7','#81c784','#ffb74d','#f06292','#ce93d8','#fff176'];

        function spawnParticles(originEl) {
            const rect = originEl.getBoundingClientRect();
            const ox = rect.left + rect.width / 2;
            const oy = rect.top  + rect.height / 2;
            for (let i = 0; i < 28; i++) {
                const p = document.createElement('div');
                p.classList.add('particle');
                const angle = Math.random() * 2 * Math.PI;
                const dist  = 80 + Math.random() * 140;
                const size  = (6 + Math.random() * 8) + 'px';
                p.style.left = ox + 'px';
                p.style.top  = oy + 'px';
                p.style.backgroundColor = particleColors[Math.floor(Math.random() * particleColors.length)];
                p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                p.style.width  = size;
                p.style.height = size;
                document.body.appendChild(p);
                p.addEventListener('animationend', () => p.remove());
            }
        }

        // --- Fraction HTML builders ---
        function fracHTML(n, d) {
            return `<div class="frac">
                        <span class="frac-num">${n}</span>
                        <div class="frac-bar"></div>
                        <span class="frac-den">${d}</span>
                    </div>`;
        }

        function signedFracHTML(n, d) {
            if (n < 0) {
                return `<span style="padding-right:0.05em">−</span>${fracHTML(-n, d)}`;
            }
            return fracHTML(n, d);
        }

        const answerFracHTML = `
            <div class="answer-frac">
                <div class="answer-box-wrap">
                    <div class="answer-box focused" id="numBox" onclick="setFocus('num')">
                        <span id="numVal"></span><span class="cursor" id="numCursor"></span>
                    </div>
                </div>
                <div class="answer-bar"></div>
                <div class="answer-box-wrap">
                    <div class="answer-box" id="denBox" onclick="setFocus('den')">
                        <span id="denVal"></span><span class="cursor" id="denCursor" style="display:none"></span>
                    </div>
                </div>
            </div>`;

        const answerMixedHTML = `
            <div class="answer-mixed">
                <div class="answer-box-wrap">
                    <div class="answer-box focused" id="wholeBox" onclick="setFocus('whole')">
                        <span id="wholeVal"></span><span class="cursor" id="wholeCursor"></span>
                    </div>
                </div>
                <div class="answer-frac">
                    <div class="answer-box-wrap">
                        <div class="answer-box" id="numBox" onclick="setFocus('num')">
                            <span id="numVal"></span><span class="cursor" id="numCursor" style="display:none"></span>
                        </div>
                    </div>
                    <div class="answer-bar"></div>
                    <div class="answer-box-wrap">
                        <div class="answer-box" id="denBox" onclick="setFocus('den')">
                            <span id="denVal"></span><span class="cursor" id="denCursor" style="display:none"></span>
                        </div>
                    </div>
                </div>
            </div>`;

        const answerDecimalHTML = `
            <div class="answer-box-wrap" style="display:inline-flex;vertical-align:middle;">
                <div class="answer-box focused" id="numBox" onclick="setFocus('num')">
                    <span id="numVal"></span><span class="cursor" id="numCursor"></span>
                </div>
            </div>`;

        function isTerminating(d) {
            while (d % 2 === 0) d /= 2;
            while (d % 5 === 0) d /= 5;
            return d === 1;
        }

        // Returns a scaleY-stretched paren character spanning the full height of a stacked fraction
        function tallParen(ch) {
            return `<span style="display:inline-block;transform:scaleY(2.1);transform-origin:center;">${ch}</span>`;
        }

        function nestedFracHTML(n, d, w, negative = false) {
            const open = negative ? '(−' : '(';
            return `<div class="frac">
                        <span class="frac-num" style="display:inline-flex;align-items:center;font-size:0.65em;padding:2px 4px;">
                            ${tallParen(open)}
                            ${fracHTML(n, d)}
                            ${tallParen(')')}
                        </span>
                        <div class="frac-bar"></div>
                        <span class="frac-den">${w}</span>
                    </div>`;
        }

        function fracExpHTML(n, d, exp) {
            return `<span style="display:inline-flex;align-items:flex-start;vertical-align:middle;">
                        <span style="display:inline-flex;align-items:center;">
                            ${tallParen('(')}
                            ${fracHTML(n, d)}
                            ${tallParen(')')}
                        </span>
                        <sup style="font-size:0.55em;line-height:1;">${exp}</sup>
                    </span>`;
        }

        function nestedFracExpHTML(n, d, exp, w) {
            return `<div class="frac">
                        <span class="frac-num" style="display:inline-flex;align-items:flex-start;font-size:0.65em;padding:2px 4px;">
                            <span style="display:inline-flex;align-items:center;">
                                ${tallParen('(')}
                                ${fracHTML(n, d)}
                                ${tallParen(')')}
                            </span>
                            <sup style="font-size:0.6em;line-height:1;">${exp}</sup>
                        </span>
                        <div class="frac-bar"></div>
                        <span class="frac-den">${w}</span>
                    </div>`;
        }

        function mixedHTML(whole, n, d) {
            return `<div style="display:inline-flex;align-items:center;gap:0.3rem;vertical-align:middle">
                        <span>${whole}</span>${fracHTML(n, d)}
                    </div>`;
        }

        // --- Exercise definitions ---
        const DENOMINATORS = [2, 3, 4, 5, 6, 8, 10];

        const SIMPLE_FRACS = [
            {n:1,d:2},{n:1,d:3},{n:2,d:3},{n:1,d:4},{n:3,d:4},
            {n:1,d:5},{n:2,d:5},{n:3,d:5},{n:4,d:5},
            {n:1,d:6},{n:5,d:6},{n:1,d:8},{n:3,d:8},{n:5,d:8},{n:7,d:8}
        ];

        const EXERCISES = {
            'add-like': {
                label: 'Adding Fractions',
                hint: 'Add the fractions.',
                generate() {
                    const d  = randFrom(DENOMINATORS);
                    const n1 = randInt(1, d - 1);
                    const n2 = randInt(1, d - 1);
                    const rN = n1 + n2, rD = d;
                    const r  = reduce(rN, rD);
                    return {
                        equationHTML: fracHTML(n1, d) + '<span>&thinsp;+&thinsp;</span>' + fracHTML(n2, d) + '<span>&thinsp;=&thinsp;</span>' + answerFracHTML,
                        answerN: r.n, answerD: r.d,
                        requireReduced: false,
                        summary: `${n1}/${d} + ${n2}/${d} = ${r.n}/${r.d}`
                    };
                }
            },

            'subtract-like': {
                label: 'Subtracting Fractions',
                hint: 'Subtract the fractions.',
                generate() {
                    const d  = randFrom(DENOMINATORS);
                    const n1 = randInt(2, d);
                    const n2 = randInt(1, n1 - 1);
                    const rN = n1 - n2, rD = d;
                    const r  = reduce(rN, rD);
                    return {
                        equationHTML: fracHTML(n1, d) + '<span>&thinsp;&minus;&thinsp;</span>' + fracHTML(n2, d) + '<span>&thinsp;=&thinsp;</span>' + answerFracHTML,
                        answerN: r.n, answerD: r.d,
                        requireReduced: false,
                        summary: `${n1}/${d} − ${n2}/${d} = ${r.n}/${r.d}`
                    };
                }
            },

            'simplify': {
                label: 'Simplifying Fractions',
                hint: 'Write the fraction in its simplest form.',
                generate() {
                    const base   = randFrom(SIMPLE_FRACS);
                    const factor = randFrom([2, 3, 4]);
                    const n = base.n * factor;
                    const d = base.d * factor;
                    return {
                        equationHTML: fracHTML(n, d) + '<span>&thinsp;=&thinsp;</span>' + answerFracHTML,
                        answerN: base.n, answerD: base.d,
                        requireReduced: true,
                        summary: `${n}/${d} = ${base.n}/${base.d}`
                    };
                }
            },

            'multiply': {
                label: 'Multiplying Fractions',
                hint: 'Multiply the fractions.',
                generate() {
                    const n1 = randInt(1, 5), d1 = randInt(2, 8);
                    const n2 = randInt(1, 5), d2 = randInt(2, 8);
                    const rN = n1 * n2, rD = d1 * d2;
                    const r  = reduce(rN, rD);
                    return {
                        equationHTML: fracHTML(n1, d1) + '<span>&thinsp;&times;&thinsp;</span>' + fracHTML(n2, d2) + '<span>&thinsp;=&thinsp;</span>' + answerFracHTML,
                        answerN: r.n, answerD: r.d,
                        requireReduced: false,
                        summary: `${n1}/${d1} × ${n2}/${d2} = ${r.n}/${r.d}`
                    };
                }
            },

            'divide': {
                label: 'Dividing Fractions',
                hint: 'Divide the fractions.',
                generate() {
                    const n1 = randInt(1, 5), d1 = randInt(2, 8);
                    const n2 = randInt(1, 5), d2 = randInt(2, 8);
                    // a/b ÷ c/d = (a*d)/(b*c)
                    const rN = n1 * d2, rD = d1 * n2;
                    const r  = reduce(rN, rD);
                    return {
                        equationHTML: fracHTML(n1, d1) + '<span>&thinsp;&divide;&thinsp;</span>' + fracHTML(n2, d2) + '<span>&thinsp;=&thinsp;</span>' + answerFracHTML,
                        answerN: r.n, answerD: r.d,
                        requireReduced: false,
                        summary: `${n1}/${d1} ÷ ${n2}/${d2} = ${r.n}/${r.d}`
                    };
                }
            },

            'add-unlike': {
                label: 'Adding Fractions (Unlike Denominators)',
                hint: 'Find a common denominator, then add.',
                generate() {
                    const denoms = [2, 3, 4, 5, 6, 8, 10];
                    const d1 = randFrom(denoms);
                    let d2;
                    do { d2 = randFrom(denoms); } while (d2 === d1);
                    const n1 = randInt(1, d1 - 1);
                    const n2 = randInt(1, d2 - 1);
                    const common = lcm(d1, d2);
                    const rN = n1 * (common / d1) + n2 * (common / d2);
                    const r  = reduce(rN, common);
                    return {
                        equationHTML: fracHTML(n1, d1) + '<span>&thinsp;+&thinsp;</span>' + fracHTML(n2, d2) + '<span>&thinsp;=&thinsp;</span>' + answerFracHTML,
                        answerN: r.n, answerD: r.d,
                        requireReduced: false,
                        summary: `${n1}/${d1} + ${n2}/${d2} = ${r.n}/${r.d}`
                    };
                }
            },

            'subtract-unlike': {
                label: 'Subtracting Fractions (Unlike Denominators)',
                hint: 'Find a common denominator, then subtract.',
                generate() {
                    const denoms = [2, 3, 4, 5, 6, 8, 10];
                    const d1 = randFrom(denoms);
                    let d2;
                    do { d2 = randFrom(denoms); } while (d2 === d1);
                    const n1 = randInt(1, d1 - 1);
                    const n2 = randInt(1, d2 - 1);
                    const common = lcm(d1, d2);
                    const rN = n1 * (common / d1) - n2 * (common / d2);
                    if (rN <= 0) return EXERCISES['subtract-unlike'].generate();
                    const r = reduce(rN, common);
                    return {
                        equationHTML: fracHTML(n1, d1) + '<span>&thinsp;&minus;&thinsp;</span>' + fracHTML(n2, d2) + '<span>&thinsp;=&thinsp;</span>' + answerFracHTML,
                        answerN: r.n, answerD: r.d,
                        requireReduced: false,
                        summary: `${n1}/${d1} − ${n2}/${d2} = ${r.n}/${r.d}`
                    };
                }
            },

            'convert': {
                label: 'Converting Fractions',
                hint: 'Convert between mixed numbers and improper fractions.',
                generate() {
                    if (Math.random() < 0.5) {
                        return EXERCISES['mixed-to-improper'].generate();
                    } else {
                        return EXERCISES['improper-to-mixed'].generate();
                    }
                }
            },

            'mixed-to-improper': {
                label: 'Mixed to Improper Fraction',
                hint: 'Convert the mixed number to an improper fraction.',
                generate() {
                    const d = randFrom([2, 3, 4, 5, 6, 8]);
                    const whole = randInt(1, 5);
                    const n = randInt(1, d - 1);
                    const improperN = whole * d + n;
                    return {
                        equationHTML: mixedHTML(whole, n, d) + '<span>&thinsp;=&thinsp;</span>' + answerFracHTML,
                        answerN: improperN, answerD: d,
                        answerType: 'frac',
                        requireReduced: false,
                        summary: `${whole} ${n}/${d} = ${improperN}/${d}`
                    };
                }
            },

            'improper-to-mixed': {
                label: 'Improper Fraction to Mixed Number',
                hint: 'Convert the improper fraction to a mixed number.',
                generate() {
                    const d = randFrom([2, 3, 4, 5, 6, 8]);
                    const whole = randInt(1, 5);
                    const n = randInt(1, d - 1);
                    const improperN = whole * d + n;
                    return {
                        equationHTML: fracHTML(improperN, d) + '<span>&thinsp;=&thinsp;</span>' + answerMixedHTML,
                        answerN: improperN, answerD: d,
                        answerType: 'mixed',
                        requireReduced: false,
                        summary: `${improperN}/${d} = ${whole} ${n}/${d}`
                    };
                }
            },

            'add-like-negative': {
                label: 'Adding Fractions (Negatives)',
                hint: 'Add the signed fractions. Use ± to make the answer negative.',
                generate() {
                    const d = randFrom(DENOMINATORS);
                    const n1raw = randInt(1, d - 1);
                    const n2raw = randInt(1, d - 1);
                    const [s1, s2] = randFrom([[-1, 1], [1, -1], [-1, -1]]);
                    const n1 = s1 * n1raw, n2 = s2 * n2raw;
                    const rN = n1 + n2;
                    if (rN === 0) return EXERCISES['add-like-negative'].generate();
                    const r = reduce(rN, d);
                    return {
                        equationHTML: signedFracHTML(n1, d) + '<span>&thinsp;+&thinsp;</span>' + signedFracHTML(n2, d) + '<span>&thinsp;=&thinsp;</span>' + answerFracHTML,
                        answerN: r.n, answerD: r.d,
                        requireReduced: false,
                        summary: `${n1}/${d} + ${n2}/${d} = ${r.n}/${r.d}`
                    };
                }
            },

            'subtract-like-negative': {
                label: 'Subtracting Fractions (Negatives)',
                hint: 'Subtract. The answer will be negative — use ± to enter it.',
                generate() {
                    const d = randFrom(DENOMINATORS.filter(x => x >= 3));
                    const n1 = randInt(1, d - 2);
                    const n2 = randInt(n1 + 1, d - 1);
                    const rN = n1 - n2;  // always negative
                    const r = reduce(rN, d);
                    return {
                        equationHTML: fracHTML(n1, d) + '<span>&thinsp;&minus;&thinsp;</span>' + fracHTML(n2, d) + '<span>&thinsp;=&thinsp;</span>' + answerFracHTML,
                        answerN: r.n, answerD: r.d,
                        requireReduced: false,
                        summary: `${n1}/${d} − ${n2}/${d} = ${r.n}/${r.d}`
                    };
                }
            },

            'multiply-negative': {
                label: 'Multiplying Fractions (Negatives)',
                hint: 'Multiply. Watch the signs!',
                generate() {
                    const n1 = randInt(1, 5), d1 = randInt(2, 8);
                    const n2 = randInt(1, 5), d2 = randInt(2, 8);
                    const [s1, s2] = randFrom([[-1, 1], [1, -1], [-1, -1]]);
                    const sn1 = s1 * n1, sn2 = s2 * n2;
                    const rN = sn1 * sn2, rD = d1 * d2;
                    const r = reduce(rN, rD);
                    return {
                        equationHTML: signedFracHTML(sn1, d1) + '<span>&thinsp;&times;&thinsp;</span>' + signedFracHTML(sn2, d2) + '<span>&thinsp;=&thinsp;</span>' + answerFracHTML,
                        answerN: r.n, answerD: r.d,
                        requireReduced: false,
                        summary: `${sn1}/${d1} × ${sn2}/${d2} = ${r.n}/${r.d}`
                    };
                }
            },

            'divide-negative': {
                label: 'Dividing Fractions (Negatives)',
                hint: 'Divide. Watch the signs!',
                generate() {
                    const n1 = randInt(1, 5), d1 = randInt(2, 8);
                    const n2 = randInt(1, 5), d2 = randInt(2, 8);
                    const [s1, s2] = randFrom([[-1, 1], [1, -1], [-1, -1]]);
                    const sn1 = s1 * n1, sn2 = s2 * n2;
                    // a/b ÷ c/d = (a*d)/(b*c); normalize so denominator is positive
                    let rN = sn1 * d2, rD = d1 * sn2;
                    if (rD < 0) { rN = -rN; rD = -rD; }
                    const r = reduce(rN, rD);
                    return {
                        equationHTML: signedFracHTML(sn1, d1) + '<span>&thinsp;&divide;&thinsp;</span>' + signedFracHTML(sn2, d2) + '<span>&thinsp;=&thinsp;</span>' + answerFracHTML,
                        answerN: r.n, answerD: r.d,
                        requireReduced: false,
                        summary: `${sn1}/${d1} ÷ ${sn2}/${d2} = ${r.n}/${r.d}`
                    };
                }
            },

            'simple-fractions': {
                label: 'Simple Fractions',
                hint: 'Write the fraction as a decimal or whole number.',
                generate() {
                    const pool = [
                        {n:1,d:2},{n:1,d:4},{n:3,d:4},
                        {n:1,d:5},{n:2,d:5},{n:3,d:5},{n:4,d:5},
                        {n:1,d:8},{n:3,d:8},{n:5,d:8},{n:7,d:8},

                    ];
                    const {n, d} = randFrom(pool);
                    const dec = n / d;
                    const decStr = dec % 1 === 0 ? String(dec) : String(parseFloat(dec.toFixed(10)));
                    return {
                        equationHTML: fracHTML(n, d) + '<span>&thinsp;=&thinsp;</span>' + answerDecimalHTML,

                    };
                }
            },

            'simple-fractions-negative': {
                label: 'Simple Fractions · Negatives',
                hint: 'Write the negative fraction as a decimal.',
                generate() {
                    const pool = [
                        {n:1,d:2},{n:1,d:4},{n:3,d:4},
                        {n:1,d:5},{n:2,d:5},{n:3,d:5},{n:4,d:5},
                        {n:1,d:8},{n:3,d:8},{n:5,d:8},{n:7,d:8},
                        {n:1,d:10},{n:3,d:10},{n:7,d:10},{n:9,d:10},
                    ];
                    const {n, d} = randFrom(pool);
                    const dec = -(n / d);
                    const decStr = String(parseFloat(dec.toFixed(10)));
                    return {
                        equationHTML: '<span>−</span>' + fracHTML(n, d) + '<span>&thinsp;=&thinsp;</span>' + answerDecimalHTML,
                        answerDecimal: dec,
                        answerType: 'decimal-neg',
                        summary: `−${n}/${d} = ${decStr}`
                    };
                }
            },

            'simple-fractions-exponent': {
                label: 'Simple Fractions · Exponents',
                generate() {
                    const exp = randFrom([2, 3]);
                    const pool = exp === 2
                        ? [{n:1,d:2},{n:1,d:4},{n:3,d:4},{n:1,d:5},{n:2,d:5},{n:3,d:5},{n:4,d:5},{n:1,d:8},{n:3,d:8},{n:5,d:8},{n:7,d:8},{n:1,d:10},{n:3,d:10},{n:7,d:10},{n:9,d:10}]
                        : [{n:1,d:2},{n:1,d:4},{n:3,d:4},{n:1,d:5},{n:2,d:5},{n:3,d:5},{n:4,d:5}];
                    const {n, d} = randFrom(pool);
                    const dec = Math.pow(n / d, exp);
                    const rD = Math.pow(d, exp);
                    const terminates = isTerminating(rD);
                    const answerDecimal = terminates ? dec : Math.trunc(dec * 100) / 100;
                    const decStr = terminates
                        ? String(parseFloat(dec.toFixed(10)))
                        : (Math.trunc(dec * 100) / 100).toFixed(2);
                    return {
                        equationHTML: fracExpHTML(n, d, exp) + '<span>&thinsp;=&thinsp;</span>' + answerDecimalHTML,
                        answerDecimal,
                        answerType: 'decimal',
                        hint: terminates
                            ? 'Raise the fraction to the power, then write as a decimal.'
                            : 'Raise the fraction to the power, then write as a decimal (first 2 decimal places).',
                        summary: `(${n}/${d})^${exp} = ${decStr}`
                    };
                }
            },

            // --- Nested ---

            'nested': {
                label: 'Nested Fractions',
                generate() {
                    const {n, d} = randFrom(SIMPLE_FRACS);
                    const w = randInt(2, 9);
                    const r = reduce(n, d * w);
                    const dec = n / (d * w);
                    const terminates = isTerminating(r.d);
                    const answerDecimal = terminates
                        ? dec
                        : Math.trunc(dec * 1000) / 1000;
                    const decStr = terminates
                        ? (dec % 1 === 0 ? String(dec) : String(parseFloat(dec.toFixed(10))))
                        : (Math.trunc(dec * 1000) / 1000).toFixed(3);
                    return {
                        equationHTML: nestedFracHTML(n, d, w) + '<span>&thinsp;=&thinsp;</span>' + answerDecimalHTML,
                        answerDecimal,
                        answerType: 'decimal',
                        hint: terminates
                            ? 'Convert the nested fraction to a decimal.'
                            : 'Convert the nested fraction to a decimal (enter the first 3 decimal places).',
                        summary: `(${n}/${d})/${w} = ${decStr}`
                    };
                }
            },

            'nested-negative': {
                label: 'Nested Fractions · Negatives',
                generate() {
                    const {n, d} = randFrom(SIMPLE_FRACS);
                    const w = randInt(2, 9);
                    const r = reduce(n, d * w);
                    const dec = -(n / (d * w));
                    const terminates = isTerminating(r.d);
                    const answerDecimal = terminates ? dec : Math.trunc(dec * 1000) / 1000;
                    const decStr = terminates
                        ? String(parseFloat(dec.toFixed(10)))
                        : (Math.trunc(dec * 1000) / 1000).toFixed(3);
                    return {
                        equationHTML: nestedFracHTML(n, d, w, true) + '<span>&thinsp;=&thinsp;</span>' + answerDecimalHTML,

                        answerType: 'decimal-neg',
                        hint: terminates

                    };
                }

            'nested-exponent': {
                label: 'Nested Fractions · Exponents',
                generate() {
                    const exp = randFrom([2, 3]);
                    const pool = exp === 2
                        ? [{n:1,d:2},{n:1,d:4},{n:3,d:4},{n:1,d:5},{n:2,d:5},{n:3,d:5},{n:4,d:5}]
                        : [{n:1,d:2},{n:1,d:4},{n:3,d:4},{n:1,d:5},{n:2,d:5}];
                    const {n, d} = randFrom(pool);
                    const w = randInt(2, 6);
                    const rD = Math.pow(d, exp) * w;
                    const rN = Math.pow(n, exp);
                    const r = reduce(rN, rD);
                    const dec = rN / rD;
                    const terminates = isTerminating(r.d);
                    const answerDecimal = terminates ? dec : Math.trunc(dec * 1000) / 1000;
                    const decStr = terminates
                        ? String(parseFloat(dec.toFixed(10)))
                        : (Math.trunc(dec * 1000) / 1000).toFixed(3);
                    return {
                        equationHTML: nestedFracExpHTML(n, d, exp, w) + '<span>&thinsp;=&thinsp;</span>' + answerDecimalHTML,
                        answerDecimal,
                        answerType: 'decimal',
                        hint: terminates
                            ? 'Raise the fraction to the power, then divide by the whole number. Write as a decimal.'
                            : 'Raise the fraction to the power, divide by the whole number, then write the first 3 decimal places.',
                        summary: `(${n}/${d})^${exp}/${w} = ${decStr}`
                    };
                }
            },

            'add-nested': {
                label: 'Adding Fractions (3 Terms)',
                hint: 'Add all three fractions.',
                generate() {
                    const pool = [2, 3, 4, 5, 6];
                    const d1 = randFrom(pool);
                    const d2 = randFrom(pool.filter(x => x !== d1));
                    const d3 = randFrom(pool.filter(x => x !== d1 && x !== d2));
                    const n1 = randInt(1, d1 - 1);
                    const n2 = randInt(1, d2 - 1);
                    const n3 = randInt(1, d3 - 1);
                    const lcd = lcm(lcm(d1, d2), d3);
                    const rN = n1*(lcd/d1) + n2*(lcd/d2) + n3*(lcd/d3);
                    const r = reduce(rN, lcd);
                    return {
                        equationHTML: fracHTML(n1,d1) + '<span>&thinsp;+&thinsp;</span>' + fracHTML(n2,d2) + '<span>&thinsp;+&thinsp;</span>' + fracHTML(n3,d3) + '<span>&thinsp;=&thinsp;</span>' + answerFracHTML,
                        answerN: r.n, answerD: r.d,
                        requireReduced: false,
                        summary: `${n1}/${d1} + ${n2}/${d2} + ${n3}/${d3} = ${r.n}/${r.d}`
                    };
                }
            },

            'subtract-nested': {
                label: 'Subtracting Fractions (3 Terms)',
                hint: 'Subtract left to right.',
                generate() {
                    const pool = [2, 3, 4, 5, 6];
                    const d1 = randFrom(pool);
                    const d2 = randFrom(pool.filter(x => x !== d1));
                    const d3 = randFrom(pool.filter(x => x !== d1 && x !== d2));
                    const n1 = randInt(1, d1 - 1);
                    const n2 = randInt(1, d2 - 1);
                    const n3 = randInt(1, d3 - 1);
                    const lcd = lcm(lcm(d1, d2), d3);
                    const rN = n1*(lcd/d1) - n2*(lcd/d2) - n3*(lcd/d3);
                    if (rN <= 0) return EXERCISES['subtract-nested'].generate();
                    const r = reduce(rN, lcd);
                    return {
                        equationHTML: fracHTML(n1,d1) + '<span>&thinsp;&minus;&thinsp;</span>' + fracHTML(n2,d2) + '<span>&thinsp;&minus;&thinsp;</span>' + fracHTML(n3,d3) + '<span>&thinsp;=&thinsp;</span>' + answerFracHTML,
                        answerN: r.n, answerD: r.d,
                        requireReduced: false,
                        summary: `${n1}/${d1} - ${n2}/${d2} - ${n3}/${d3} = ${r.n}/${r.d}`
                    };
                }
            },

            'multiply-nested': {
                label: 'Multiplying Fractions (3 Terms)',
                hint: 'Multiply all three fractions together.',
                generate() {
                    const n1 = randInt(1, 5), d1 = randInt(2, 6);
                    const n2 = randInt(1, 5), d2 = randInt(2, 6);
                    const n3 = randInt(1, 5), d3 = randInt(2, 6);
                    const r = reduce(n1*n2*n3, d1*d2*d3);
                    return {
                        equationHTML: fracHTML(n1,d1) + '<span>&thinsp;&times;&thinsp;</span>' + fracHTML(n2,d2) + '<span>&thinsp;&times;&thinsp;</span>' + fracHTML(n3,d3) + '<span>&thinsp;=&thinsp;</span>' + answerFracHTML,
                        answerN: r.n, answerD: r.d,
                        requireReduced: false,
                        summary: `${n1}/${d1} × ${n2}/${d2} × ${n3}/${d3} = ${r.n}/${r.d}`
                    };
                }
            },

            'divide-nested': {
                label: 'Dividing Fractions (3 Terms)',
                hint: 'Divide left to right: (a ÷ b) ÷ c.',
                generate() {
                    const n1 = randInt(1, 5), d1 = randInt(2, 6);
                    const n2 = randInt(1, 5), d2 = randInt(2, 6);
                    const n3 = randInt(1, 5), d3 = randInt(2, 6);
                    // (n1/d1 ÷ n2/d2) ÷ n3/d3 = (n1·d2·d3) / (d1·n2·n3)
                    const r = reduce(n1*d2*d3, d1*n2*n3);
                    return {
                        equationHTML: fracHTML(n1,d1) + '<span>&thinsp;&divide;&thinsp;</span>' + fracHTML(n2,d2) + '<span>&thinsp;&divide;&thinsp;</span>' + fracHTML(n3,d3) + '<span>&thinsp;=&thinsp;</span>' + answerFracHTML,
                        answerN: r.n, answerD: r.d,
                        requireReduced: false,
                        summary: `${n1}/${d1} ÷ ${n2}/${d2} ÷ ${n3}/${d3} = ${r.n}/${r.d}`
                    };
                }
            },

            // --- Equations (find the missing fraction) ---

            'add-equation': {
                label: 'Adding Fractions (Find the Missing Piece)',
                hint: 'What fraction makes the equation true?',
                generate() {
                    const d1 = randFrom([2, 3, 4, 5, 6]);
                    const d2 = randFrom([2, 3, 4, 5, 6].filter(x => x !== d1));
                    const n1 = randInt(1, d1 - 1);
                    const n2 = randInt(1, d2 - 1);
                    const lcd = lcm(d1, d2);
                    const rN = n1*(lcd/d1) + n2*(lcd/d2);
                    const r = reduce(rN, lcd);
                    const ans = reduce(n1, d1);
                    return {
                        equationHTML: answerFracHTML + '<span>&thinsp;+&thinsp;</span>' + fracHTML(n2,d2) + '<span>&thinsp;=&thinsp;</span>' + fracHTML(r.n,r.d),
                        answerN: ans.n, answerD: ans.d,
                        requireReduced: false,
                        summary: `? + ${n2}/${d2} = ${r.n}/${r.d}`
                    };
                }
            },

            'subtract-equation': {
                label: 'Subtracting Fractions (Find the Missing Piece)',
                hint: 'What fraction makes the equation true?',
                generate() {
                    const d1 = randFrom([2, 3, 4, 5, 6]);
                    const d2 = randFrom([2, 3, 4, 5, 6].filter(x => x !== d1));
                    const n1 = randInt(1, d1 - 1);
                    const n2 = randInt(1, d2 - 1);
                    if (n1 * d2 <= n2 * d1) return EXERCISES['subtract-equation'].generate();
                    const lcd = lcm(d1, d2);
                    const rN = n1*(lcd/d1) - n2*(lcd/d2);
                    const r = reduce(rN, lcd);
                    const ans = reduce(n1, d1);
                    return {
                        equationHTML: answerFracHTML + '<span>&thinsp;&minus;&thinsp;</span>' + fracHTML(n2,d2) + '<span>&thinsp;=&thinsp;</span>' + fracHTML(r.n,r.d),
                        answerN: ans.n, answerD: ans.d,
                        requireReduced: false,
                        summary: `? - ${n2}/${d2} = ${r.n}/${r.d}`
                    };
                }
            },

            'multiply-equation': {
                label: 'Multiplying Fractions (Find the Missing Piece)',
                hint: 'What fraction makes the equation true?',
                generate() {
                    const n1 = randInt(1, 5), d1 = randInt(2, 6);
                    const n2 = randInt(1, 5), d2 = randInt(2, 6);
                    const r = reduce(n1*n2, d1*d2);
                    const ans = reduce(n1, d1);
                    return {
                        equationHTML: answerFracHTML + '<span>&thinsp;&times;&thinsp;</span>' + fracHTML(n2,d2) + '<span>&thinsp;=&thinsp;</span>' + fracHTML(r.n,r.d),
                        answerN: ans.n, answerD: ans.d,
                        requireReduced: false,
                        summary: `? × ${n2}/${d2} = ${r.n}/${r.d}`
                    };
                }
            },

            'divide-equation': {
                label: 'Dividing Fractions (Find the Missing Piece)',
                hint: 'What fraction makes the equation true?',
                generate() {
                    const n1 = randInt(1, 5), d1 = randInt(2, 6);
                    const n2 = randInt(1, 5), d2 = randInt(2, 6);
                    // n1/d1 ÷ n2/d2 = (n1·d2)/(d1·n2)
                    const r = reduce(n1*d2, d1*n2);
                    const ans = reduce(n1, d1);
                    return {
                        equationHTML: answerFracHTML + '<span>&thinsp;&divide;&thinsp;</span>' + fracHTML(n2,d2) + '<span>&thinsp;=&thinsp;</span>' + fracHTML(r.n,r.d),
                        answerN: ans.n, answerD: ans.d,
                        requireReduced: false,
                        summary: `? ÷ ${n2}/${d2} = ${r.n}/${r.d}`
                    };
                }
            }
        };

        // --- Input state ---
        let focused    = 'num';
        let wholeInput = '';
        let numInput   = '';
        let denInput   = '';
        let currentQ   = null;
        let locked     = false;

        function renderAnswer() {
            const set = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
            const show = (id, visible) => { const el = document.getElementById(id); if (el) el.style.display = visible ? '' : 'none'; };
            const tog  = (id, on) => { const el = document.getElementById(id); if (el) el.classList.toggle('focused', on); };

            set('wholeVal', wholeInput);
            set('numVal',   numInput);
            set('denVal',   denInput);

            show('wholeCursor', focused === 'whole');
            show('numCursor',   focused === 'num');
            show('denCursor',   focused === 'den');

            tog('wholeBox', focused === 'whole');
            tog('numBox',   focused === 'num');
            tog('denBox',   focused === 'den');
        }

        function setFocus(box) {
            focused = box;
            renderAnswer();
        }

        function appendDigit(d) {
            if (locked) return;
            if (d === '.' && (focused !== 'num' || numInput.includes('.'))) return;
            const numDigits = numInput.replace('-', '').length;
            if      (focused === 'whole' && wholeInput.length < 3) wholeInput += d;
            else if (focused === 'num'   && numDigits   < 8)       numInput   += d;
            else if (focused === 'den'   && denInput.length   < 5) denInput   += d;
            renderAnswer();
        }

        function toggleSign() {
            if (locked) return;
            if (currentQ?.answerType === 'decimal') {
                appendDigit('.');
                return;
            }
            if (currentQ?.answerType === 'decimal-neg' || focused === 'num') {
                if (numInput.startsWith('-')) numInput = numInput.slice(1);
                else numInput = '-' + numInput;
                renderAnswer();
            }
        }

        function backspaceDigit() {
            if (locked) return;
            if      (focused === 'whole') wholeInput = wholeInput.slice(0, -1);
            else if (focused === 'num')   numInput   = numInput.slice(0, -1);
            else                          denInput   = denInput.slice(0, -1);
            renderAnswer();
        }

        function clearFocused() {
            if (locked) return;
            if      (focused === 'whole') wholeInput = '';
            else if (focused === 'num')   numInput   = '';
            else                          denInput   = '';
            renderAnswer();
        }

        // --- Load question ---
        function loadQuestion() {
            const key = exerciseList[Math.floor(Math.random() * exerciseList.length)];
            const def = EXERCISES[key] || EXERCISES['add-like'];
            currentQ  = def.generate();

            document.getElementById('hintText').textContent = currentQ.hint || def.hint || '';
            document.getElementById('equationArea').innerHTML = currentQ.equationHTML;

            // Re-attach click handlers after innerHTML rebuild
            const wb = document.getElementById('wholeBox');
            const nb = document.getElementById('numBox');
            const db = document.getElementById('denBox');
            if (wb) wb.addEventListener('click', () => setFocus('whole'));
            if (nb) nb.addEventListener('click', () => setFocus('num'));
            if (db) db.addEventListener('click', () => setFocus('den'));

            wholeInput = '';
            numInput   = '';
            denInput   = '';
            focused    = currentQ.answerType === 'mixed' ? 'whole' : 'num';
            locked     = false;
            document.getElementById('btnSwitch').innerHTML =
                currentQ.answerType === 'decimal' ? '.' : '&plusmn;';
            document.getElementById('btnSwitch').title =
                currentQ.answerType === 'decimal-neg' ? 'Toggle negative sign (decimal: use keyboard)' : '';
            renderAnswer();
        }

        // --- Check answer ---
        function getAnswerBoxes() {
            return ['wholeBox','numBox','denBox'].map(id => document.getElementById(id)).filter(Boolean);
        }

        function flashBoxes(cls, duration) {
            const boxes = getAnswerBoxes();
            boxes.forEach(b => b.classList.add(cls));
            if (duration) setTimeout(() => boxes.forEach(b => b.classList.remove(cls)), duration);
        }

        function handleCheck() {
            if (locked) return;
            const checkPath = document.querySelector('#checkBtn svg path');
            const len = checkPath.getTotalLength();
            const anim = checkPath.animate([
                { offset: 0,    strokeDasharray: `${len} ${len}`, opacity: 1,   easing: 'ease-in' },
                { offset: 0.38, strokeDasharray: `0.5 ${len}`,    opacity: 0.2, easing: 'linear' },
                { offset: 0.44, strokeDasharray: `${len} ${len}`, opacity: 0,   easing: 'ease-out' },
                { offset: 1.0,  strokeDasharray: `${len} ${len}`, opacity: 1 },
            ], { duration: 325 });
            const q = currentQ;
            let correct;

            if (q.answerType === 'decimal' || q.answerType === 'decimal-neg') {
                const userVal = parseFloat(numInput);
                if (isNaN(userVal)) return;
                correct = Math.abs(userVal - q.answerDecimal) < 1e-9;
            } else if (q.answerType === 'mixed') {
                const userW = parseInt(wholeInput) || 0;
                const userN = parseInt(numInput);
                const userD = parseInt(denInput);
                if (isNaN(userN) || isNaN(userD) || userD === 0) return;
                // Convert user mixed number to improper: (W*D + N)/D, compare via cross-mult
                correct = fracEqual(userW * userD + userN, userD, q.answerN, q.answerD);
            } else {
                const userN = parseInt(numInput);
                const userD = parseInt(denInput);
                if (isNaN(userN) || isNaN(userD) || userD === 0) return;
                if (q.requireReduced) {
                    correct = userN === q.answerN && userD === q.answerD && isReduced(userN, userD);
                } else {
                    correct = fracEqual(userN, userD, q.answerN, q.answerD);
                }
            }

            if (correct) {
                locked = true;
                questionsCorrect++;
                questionsAnswered++;
                flashBoxes('flash-correct');
                updateScore();
                setTimeout(() => {
                    spawnParticles(document.getElementById('checkBtn'));
                    showPrev(q.summary, true);
                    transitionToNext();
                }, 325);
            } else {
                flashBoxes('flash-wrong', 600);
                questionsAnswered++;
                updateScore();
                setTimeout(() => {
                    showPrev(q.summary + ' ✗', false);
                    wholeInput = '';
                    numInput   = '';
                    denInput   = '';
                    renderAnswer();
                }, 600);
            }
        }

        function updateScore() {
            document.getElementById('questionsAnswered').textContent = questionsAnswered;
            document.getElementById('questionscorrect').textContent  = questionsCorrect;
        }

        // --- Previous question display ---
        function showPrev(summary, wasCorrect) {
            const el = document.getElementById('prevArea');
            el.textContent = summary + (wasCorrect ? '  ✓' : '  ✗');
            el.className   = 'prev-area ' + (wasCorrect ? 'correct-result' : 'wrong-result');
        }

        // --- Question transition ---
        function transitionToNext() {
            const eq = document.getElementById('equationArea');
            eq.style.transition = 'opacity 0.25s ease, transform 0.25s ease';
            eq.style.opacity    = '0';
            eq.style.transform  = 'translateY(10px)';
            setTimeout(() => {
                loadQuestion();
                eq.style.transform = 'translateY(-6px)';
                eq.offsetHeight;
                eq.style.opacity   = '1';
                eq.style.transform = 'translateY(0)';
                setTimeout(() => { eq.style.transition = ''; }, 300);
            }, 280);
        }

        // --- Focus cycling ---
        function cycleFocus() {
            const isMixed = currentQ && currentQ.answerType === 'mixed';
            if (isMixed) {
                focused = focused === 'whole' ? 'num' : focused === 'num' ? 'den' : 'whole';
            } else {
                focused = focused === 'num' ? 'den' : 'num';
            }
        }

        // --- Keyboard ---
        document.addEventListener('keydown', e => {
            if (e.key >= '0' && e.key <= '9') {
                appendDigit(e.key);
            } else if (e.key === '.') {
                appendDigit('.');
            } else if (e.key === '-') {
                toggleSign();
            } else if (e.key === 'Backspace') {
                backspaceDigit();
            } else if (e.key === 'Delete') {
                clearFocused();
            } else if (e.key === 'Tab') {
                e.preventDefault();
                cycleFocus();
                renderAnswer();
            } else if (e.key === 'Enter') {
                handleCheck();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                if (focused === 'den') { focused = 'num'; renderAnswer(); }
            } else if (e.key === 'ArrowDown') {
                e.preventDefault();
                if (focused === 'num') { focused = 'den'; renderAnswer(); }
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                if ((focused === 'num' || focused === 'den') && currentQ?.answerType === 'mixed') {
                    focused = 'whole'; renderAnswer();
                }
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                if (focused === 'whole') { focused = 'num'; renderAnswer(); }
            }
        });

        // --- Finish button ---
        document.getElementById('finishButton').addEventListener('click', () => {
            spawnParticles(document.getElementById('finishButton'));
            setTimeout(() => { window.location.href = 'index.html'; }, 1000);
        });

        // --- Init ---
        document.addEventListener('DOMContentLoaded', () => {
            const def = exerciseList.length > 1
                ? { label: 'Mixed Practice' }
                : (EXERCISES[exerciseList[0]] || EXERCISES['add-like']);
            document.getElementById('modeIndicator').textContent = def.label;

            // Numpad
            ['1','2','3','4','5','6','7','8','9','0'].forEach(d => {
                document.getElementById('btn' + d).addEventListener('click', () => appendDigit(d));
            });
            document.getElementById('btnSwitch').addEventListener('click', toggleSign);
            document.getElementById('btnBack').addEventListener('click', backspaceDigit);
            document.getElementById('checkBtn').addEventListener('click', handleCheck);
            document.getElementById('deleteButton').addEventListener('click', clearFocused);

            loadQuestion();
        });
    </script>
</body>
</html>
