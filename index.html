<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="icon" href="newicon.png" type="image/x-icon">
    <title>MP Launcher 1.5.0</title>
    <style>
        * {
            font-family: 'Roboto Mono', monospace;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            position: relative;
            background-color: #1a1a2e;
            color: rgb(190, 205, 218);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            padding-top: 8rem;
        }

        .title {
            font-size: 2.5rem;
            font-weight: 600;
            position: absolute;
            top: 2.5rem;
            left: 0;
            right: 0;
            text-align: center;
            opacity: 0;
            animation: fadeInOpacity 0.5s ease forwards;
        }

        /* Selection area */

        #selectionArea {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .subtitle {
            font-size: 1rem;
            color: rgba(190, 205, 218, 0.55);
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.1s forwards;
        }

        .mode-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.2s forwards;
        }

        .mode-section {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 0.6rem;
        }

        .mode-label {
            font-size: 1rem;
            font-weight: 600;
            color: rgba(190, 205, 218, 0.75);
            margin-bottom: 0.2rem;
        }

        .launch-btn {
            display: block;
            width: 180px;
            padding: 11px 16px;
            font-size: 1rem;
            font-family: 'Roboto Mono', monospace;
            background-color: rgb(35, 50, 85);
            color: rgba(227, 234, 245, 0.9);
            border: none;
            cursor: pointer;
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            text-decoration: none;
            text-align: left;
            transition: background-color 0.2s, box-shadow 0.2s;
        }

        .launch-btn:hover {
            background-color: rgb(52, 75, 120);
            box-shadow: 3.5px 3.5px 4px rgba(0, 0, 0, 0.5);
        }

        .launch-btn:active {
            background-color: rgb(20, 32, 60);
            box-shadow: none;
        }

        .fade-out-down {
            animation: fadeOutDown 0.4s ease forwards;
            pointer-events: none;
        }

        /* Launch area */

        #launchArea {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .spinner {
            width: 64px;
            height: 64px;
            border: 6px solid rgba(255, 255, 255, 0.15);
            border-top-color: rgb(60, 100, 170);
            border-radius: 50%;
            opacity: 0;
            animation: spin 0.8s linear infinite, fadeInOpacity 0.5s ease forwards;
        }

        .spinner.done {
            border-top-color: rgb(79, 117, 63);
        }

        .progress-bar-track {
            width: 240px;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 2rem;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 0.5s ease 0.1s forwards;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: rgb(60, 100, 170);
            border-radius: 3px;
            transition: width 2s linear;
        }

        .status {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            opacity: 0;
            animation: fadeIn 0.5s ease 0.2s forwards;
        }

        /* Animations */

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInOpacity {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeOutDown {
            from { opacity: 1; transform: translateY(0); }
            to { opacity: 0; transform: translateY(30px); }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .mode-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .mode-section {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .mode-label {
                width: 100%;
            }

            .launch-btn {
                width: auto;
                flex: 1;
                min-width: 100px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <h1 class="title">Math Practice</h1>

    <div id="selectionArea">
        <p class="subtitle">Select a mode to begin</p>
        <div class="mode-grid">
            <div class="mode-section">
                <span class="mode-label">Multiplication</span>
                <a class="launch-btn" href="practice.html?mode=multiply&digits=1">1-Digit</a>
                <a class="launch-btn" href="practice.html?mode=multiply&digits=2">2-Digit</a>
                <a class="launch-btn" href="practice.html?mode=multiply&digits=3">3-Digit</a>
            </div>
            <div class="mode-section">
                <span class="mode-label">Addition</span>
                <a class="launch-btn" href="practice.html?mode=add&digits=1">1-Digit</a>
                <a class="launch-btn" href="practice.html?mode=add&digits=2">2-Digit</a>
                <a class="launch-btn" href="practice.html?mode=add&digits=3">3-Digit</a>
            </div>
            <div class="mode-section">
                <span class="mode-label">Subtraction</span>
                <a class="launch-btn" href="practice.html?mode=subtract&digits=1">1-Digit</a>
                <a class="launch-btn" href="practice.html?mode=subtract&digits=2">2-Digit</a>
                <a class="launch-btn" href="practice.html?mode=subtract&digits=3">3-Digit</a>
            </div>
            <div class="mode-section">
                <span class="mode-label">Division</span>
                <a class="launch-btn" href="practice.html?mode=divide&digits=2">2-Digit</a>
                <a class="launch-btn" href="practice.html?mode=divide&digits=3">3-Digit</a>
            </div>
        </div>
    </div>

    <div id="launchArea">
        <div class="spinner" id="spinner"></div>
        <div class="progress-bar-track">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <p class="status">Loading...</p>
    </div>

    <script>
        document.querySelectorAll('.launch-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                e.preventDefault();
                const href = btn.getAttribute('href');

                const selectionArea = document.getElementById('selectionArea');
                selectionArea.classList.add('fade-out-down');

                setTimeout(() => {
                    selectionArea.style.display = 'none';
                    const launchArea = document.getElementById('launchArea');
                    launchArea.style.display = 'flex';
                    setTimeout(() => {
                        document.getElementById('progressFill').style.width = '100%';
                    }, 50);
                }, 400);

                setTimeout(() => {
                    document.getElementById('spinner').classList.add('done');
                }, 2200);

                setTimeout(() => {
                    window.location.href = href;
                }, 2500);
            });
        });
    </script>
</body>
</html>
