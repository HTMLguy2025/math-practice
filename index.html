<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap" rel="stylesheet">
    <link rel="icon" href="newicon.png" type="image/x-icon">
    <title>MP Launcher 1.4.0</title>
    <style>
        * {
            font-family: 'Roboto Mono', monospace;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: rgb(190, 205, 218);
        }

        .title {
            font-size: 3rem;
            font-weight: 600;
            margin-bottom: 2.5rem;
            opacity: 0;
            animation: fadeIn 0.6s ease forwards;
        }

        .spinner {
            width: 64px;
            height: 64px;
            border: 6px solid rgba(255, 255, 255, 0.15);
            border-top-color: rgb(60, 100, 170);
            border-radius: 50%;
            opacity: 0;
            animation: spin 0.8s linear infinite, fadeIn 0.6s ease 0.2s forwards;
        }

        .spinner.done {
            border-top-color: rgb(79, 117, 63);
        }

        .progress-bar-track {
            width: 240px;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 2rem;
            overflow: hidden;
            opacity: 0;
            animation: fadeIn 0.6s ease 0.3s forwards;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background-color: rgb(60, 100, 170);
            border-radius: 3px;
            animation: fill 1s ease forwards 0.4s;
        }

        .status {
            margin-top: 1.5rem;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            opacity: 0;
            animation: fadeIn 0.6s ease 0.4s forwards;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        @keyframes fill {
            to { width: 100%; }
        }
    </style>
</head>
<body>
    <h1 class="title">Math Practice</h1>
    <h1 class="title">1.4.0</h1>
    <div class="spinner" id="spinner"></div>
    <div class="progress-bar-track">
        <div class="progress-bar-fill"></div>
    </div>
    <p class="status" id="status">Launching...</p>

    <script>
        setTimeout(() => {
            window.location.href = 'practice.html';
            document.getElementById('spinner').classList.add('done');
        }, 3000);
    </script>
</body>
</html>
